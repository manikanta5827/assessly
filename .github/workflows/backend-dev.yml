name: Backend Dev Deploy

on:
  push:
    branches: [dev]
    paths:
      - "backend/**"

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Configure AWS creds
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ap-south-1
          role-to-assume: ${{ secrets.AWS_ROLE_DEV }}

      - name: Get Direct URL
        run: |
          URL=$(aws ssm get-parameter --name "/assessly/dev/DIRECT_URL" --with-decryption --query "Parameter.Value" --output text)
          echo "DIRECT_URL=$URL" >> $GITHUB_ENV

      - name: Install deps
        run: npm install

      - name: Setup SAM CLI
        uses: aws-actions/setup-sam@v2

      - name: Run Drizzle Migrations
        run: |
          npm run db:migrate

      - name: Build SAM
        run: sam build --parallel

      - name: Deploy SAM (dev)
        run: sam deploy --config-env dev --no-confirm-changeset
