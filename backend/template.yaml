AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Assessly - AI GitHub Assessment Reviewer
 
# --- MAPPINGS
Mappings:
  StageConfig:
    dev:
      LogRetention: 3
    prod:
      LogRetention: 7


# --- PARAMETERS
Parameters:
  Stage:
    Type: String
    Description: stage name for all resources
    AllowedValues:
      - dev
      - prod
    Default: dev

# --- GLOBALS
Globals:
  Function:
    Runtime: nodejs24.x
    Architectures:
      - arm64
    Environment:
      Variables:
        LOG_LEVEL: INFO

Resources:
  # --- LAMBDA FUNCTIONS
  # Trigger Function
  TriggerFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ./
      Handler: src/lambdas/trigger-assessment.handler
      Policies:
        - AWSLambdaBasicExecutionRole
        - SQSSendMessagePolicy:
            QueueName: !GetAtt ProcessQueue.QueueName
      Environment:
        Variables:
          QUEUE_URL: !Ref ProcessQueue
          DATABASE_URL: !Sub '{{resolve:ssm:/assessly/${Stage}/DATABASE_URL}}'
      Timeout: 30
      MemorySize: 256
      Events:
        AnalyzeApi:
          Type: Api
          Properties:
            RestApiId: !Ref APIGateway
            Path: /analyze
            Method: post
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: es2022
        External:
          - '@aws-sdk/*'
        Sourcemap: true
        EntryPoints:
          - src/lambdas/trigger-assessment.ts

  #  Actual Processing Function
  ProcessFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ./
      Handler: src/lambdas/process-assessment.handler
      Timeout: 300
      MemorySize: 512
      Policies:
        - AWSLambdaBasicExecutionRole
        - S3CrudPolicy:
            BucketName: !Ref AssesslyStorageBucket
      Environment:
        Variables:
          DATABASE_URL: !Sub '{{resolve:ssm:/assessly/${Stage}/DATABASE_URL}}'
          GITHUB_TOKEN: !Sub '{{resolve:ssm:/assessly/${Stage}/GITHUB_TOKEN}}'
          OPENAI_API_KEY: !Sub '{{resolve:ssm:/assessly/${Stage}/OPENAI_API_KEY}}'
          STORAGE_BUCKET_NAME: !Ref AssesslyStorageBucket
      Events:
        ProcessQueueEvent:
          Type: SQS
          Properties:
            Queue: !GetAtt ProcessQueue.Arn
            BatchSize: 1
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: es2022
        External:
          - '@aws-sdk/*'
        Sourcemap: true
        EntryPoints:
          - src/lambdas/process-assessment.ts

  # Get Assessment Function
  GetAssessmentFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ./
      Handler: src/lambdas/get-assessment.handler
      Timeout: 30
      MemorySize: 256
      Policies:
        - AWSLambdaBasicExecutionRole
      Environment:
        Variables:
          DATABASE_URL: !Sub '{{resolve:ssm:/assessly/${Stage}/DATABASE_URL}}'
      Events:
        GetAssessmentApi:
          Type: Api
          Properties:
            RestApiId: !Ref APIGateway
            Path: /assessment
            Method: get
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: es2022
        External:
          - '@aws-sdk/*'
        Sourcemap: true
        EntryPoints:
          - src/lambdas/get-assessment.ts

  # Consolidated Auth Function
  AuthFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ./
      Handler: src/lambdas/auth.handler
      Timeout: 30
      MemorySize: 256
      Policies:
        - AWSLambdaBasicExecutionRole
      Environment:
        Variables:
          DATABASE_URL: !Sub '{{resolve:ssm:/assessly/${Stage}/DATABASE_URL}}'
          JWT_SECRET: !Sub '{{resolve:ssm:/assessly/${Stage}/JWT_SECRET}}'
          HASH_SECRET: !Sub '{{resolve:ssm:/assessly/${Stage}/HASH_SECRET}}'
          FRONTEND_URL: !Sub '{{resolve:ssm:/assessly/${Stage}/FRONTEND_URL}}'
          RESEND_API_KEY: !Sub '{{resolve:ssm:/assessly/${Stage}/RESEND_API_KEY}}'
          EMAIL_SENDER: !Sub '{{resolve:ssm:/assessly/${Stage}/EMAIL_SENDER}}'

      Events:
        SignupApi:
          Type: Api
          Properties:
            RestApiId: !Ref APIGateway
            Path: /auth/signup
            Method: post
            Auth:
              Authorizer: NONE
        SigninApi:
          Type: Api
          Properties:
            RestApiId: !Ref APIGateway
            Path: /auth/signin
            Method: post
            Auth:
              Authorizer: NONE
        VerifyApi:
          Type: Api
          Properties:
            RestApiId: !Ref APIGateway
            Path: /auth/verify
            Method: post
            Auth:
              Authorizer: NONE
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: es2022
        Sourcemap: true
        EntryPoints:
          - src/lambdas/auth.ts

  # Auth Token Verifier lambda function
  AuthTokenVerifierLambda:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ./
      Handler: src/lambdas/auth-token-verifier.handler
      Timeout: 3
      Policies:
        - AWSLambdaBasicExecutionRole
      Environment:
        Variables:
          JWT_SECRET: !Sub '{{resolve:ssm:/assessly/${Stage}/JWT_SECRET}}'
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: es2022
        Sourcemap: true
        External:
          - '@aws-sdk/*'
        EntryPoints:
          - src/lambdas/auth-token-verifier.ts

  # --- LOG GROUPS
  LogGroup1:
    Type: AWS::Logs::LogGroup
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      LogGroupName: !Sub '/aws/lambda/${TriggerFunction}'
      RetentionInDays: !FindInMap [StageConfig, !Ref Stage, LogRetention]

  LogGroup2:
    Type: AWS::Logs::LogGroup
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      LogGroupName: !Sub '/aws/lambda/${ProcessFunction}'
      RetentionInDays: !FindInMap [StageConfig, !Ref Stage, LogRetention]

  LogGroup3:
    Type: AWS::Logs::LogGroup
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      LogGroupName: !Sub '/aws/lambda/${GetAssessmentFunction}'
      RetentionInDays: !FindInMap [StageConfig, !Ref Stage, LogRetention]

  LogGroup4:
    Type: AWS::Logs::LogGroup
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      LogGroupName: !Sub '/aws/lambda/${AuthFunction}'
      RetentionInDays: !FindInMap [StageConfig, !Ref Stage, LogRetention]
  
  LogGroup5:
    Type: AWS::Logs::LogGroup
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      LogGroupName: !Sub '/aws/lambda/${AuthTokenVerifierLambda}'
      RetentionInDays: !FindInMap [StageConfig, !Ref Stage, LogRetention]

  # --- S3 BUCKET
  AssesslyStorageBucket:
    Type: AWS::S3::Bucket
    UpdateReplacePolicy: Retain
    DeletionPolicy: Retain
    Properties:
      BucketName: !Sub '${Stage}-assessly-storage-${AWS::AccountId}'
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256

  # --- SQS QUEUE
  ProcessDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub '${Stage}-AssesslyProcessDLQ'
      MessageRetentionPeriod: 1209600 # 14 days

  ProcessQueue:
    Type: AWS::SQS::Queue
    Properties:
      VisibilityTimeout: 300
      QueueName: !Sub '${Stage}-AssesslyProcessQueue'
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt ProcessDLQ.Arn
        maxReceiveCount: 1

  # --- API GATEWAY
  APIGateway:
    Type: AWS::Serverless::Api
    Properties:
      StageName: !Ref Stage
      MinimumCompressionSize: 1024
      Cors:
        AllowOrigin: "'*'"
        AllowHeaders: "'Content-Type,Authorization'"
        AllowMethods: "'GET,POST,OPTIONS'"
      Auth:
        DefaultAuthorizer: AuthTokenVerifier
        Authorizers:
          AuthTokenVerifier:
            FunctionArn: !GetAtt AuthTokenVerifierLambda.Arn
            Type: TOKEN
            Identity:
              Header: Authorization
              ReauthorizeEvery: 0

Outputs:
  AssesslyApi:
    Description: 'API Gateway endpoint URL'
    Value: !Sub 'https://${APIGateway}.execute-api.${AWS::Region}.amazonaws.com/${Stage}'
